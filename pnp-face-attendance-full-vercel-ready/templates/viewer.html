<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Mandiri - {{ app_name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1a5276 0%,#27ae60 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.viewer-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h4{color:#1a5276;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:20px}
#videoWrap{border-radius:12px;overflow:hidden;background:#111;position:relative}
#video{width:100%;display:block}
.face-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:220px;border:3px solid rgba(39,174,96,.9);border-radius:50%;pointer-events:none;box-shadow:0 0 0 1000px rgba(0,0,0,.35)}
.result-box{border-radius:12px;padding:16px;text-align:center;margin-top:12px}
.result-success{background:#d5f5e3;border:2px solid #27ae60;color:#1e8449}
.result-error{background:#fadbd8;border:2px solid #e74c3c;color:#922b21}
.result-idle{background:#f8f9fa;border:2px solid #dee2e6;color:#6c757d}
#clock{font-size:28px;font-weight:700;text-align:center;color:#1a5276}
#dateTxt{text-align:center;color:#888;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="viewer-card">
  <div style="text-align:center;font-size:48px;margin-bottom:4px">🎓</div>
  <h4>{{ app_name }}</h4>
  <div class="subtitle">Mode Absensi Mandiri</div>
  <div id="clock">--:--:--</div>
  <div id="dateTxt">--</div>

  <div id="videoWrap" class="mb-3">
    <video id="video" autoplay muted playsinline></video>
    <div class="face-guide"></div>
  </div>
  <canvas id="canvas" style="display:none"></canvas>

  <button class="btn btn-success btn-lg w-100 mb-2" onclick="doRecognize()" id="btnScan">
    <i class="fas fa-camera me-2"></i>Scan Wajah & Absen
  </button>

  <div id="resultBox" class="result-box result-idle">
    <div style="font-size:36px" id="resultIcon">📷</div>
    <div id="resultMsg">Arahkan wajah ke kamera, lalu tekan tombol di atas</div>
  </div>

  <p class="text-center mt-3 mb-0">
    <a href="/login" class="text-muted small">Login Admin →</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');

navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})
  .then(s=>{video.srcObject=s;})
  .catch(e=>document.getElementById('resultMsg').textContent='Kamera error: '+e.message);

setInterval(()=>{
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('id-ID');
  document.getElementById('dateTxt').textContent=now.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
},1000);

async function doRecognize(){
  const btn=document.getElementById('btnScan');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Memproses...';
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const img=canvas.toDataURL('image/jpeg',0.85);

  try{
    const resp=await fetch('/api/viewer/recognize',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:img})
    });
    const data=await resp.json();
    const box=document.getElementById('resultBox');
    const icon=document.getElementById('resultIcon');
    const msg=document.getElementById('resultMsg');
    if(data.success){
      box.className='result-box result-success';
      icon.textContent='✅';
      msg.innerHTML=`<b>${data.name}</b><br><small>${data.nim}</small><br>Absensi berhasil pukul ${data.time}`;
    } else if(data.duplicate){
      box.className='result-box result-success';
      icon.textContent='⚠️';
      msg.innerHTML=data.message;
    } else {
      box.className='result-box result-error';
      icon.textContent='❌';
      msg.textContent=data.message;
    }
  }catch(e){
    document.getElementById('resultMsg').textContent='Error: '+e.message;
  }finally{
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-camera me-2"></i>Scan Wajah & Absen';
  }
}
</script>
</body>
</html>
