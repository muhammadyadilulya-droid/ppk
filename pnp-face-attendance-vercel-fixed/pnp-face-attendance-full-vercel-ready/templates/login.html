<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - {{ app_name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1a5276 0%,#2e86c1 50%,#27ae60 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:72px;text-align:center;margin-bottom:8px}
.login-card h2{text-align:center;color:#1a5276;font-weight:700;margin-bottom:4px}
.login-card p{text-align:center;color:#888;font-size:14px;margin-bottom:28px}
.form-control{border-radius:10px;padding:12px 16px;border:2px solid #e9ecef;font-size:14px}
.form-control:focus{border-color:#2e86c1;box-shadow:0 0 0 3px rgba(46,134,193,.15)}
.btn-login{background:linear-gradient(135deg,#1a5276,#2e86c1);border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;width:100%;color:#fff;transition:.3s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(46,134,193,.4);color:#fff}
.input-group-text{border-radius:10px 0 0 10px;background:#f8f9fa;border:2px solid #e9ecef;border-right:none;color:#6c757d}
.input-group .form-control{border-radius:0 10px 10px 0;border-left:none}
.input-group:focus-within .input-group-text{border-color:#2e86c1}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">🎓</div>
  <h2>{{ app_name }}</h2>
  <p>Sistem Absensi Berbasis Pengenalan Wajah</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat=='success' else 'danger' }} mb-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login">
      <i class="fas fa-sign-in-alt me-2"></i>Masuk
    </button>
  </form>
  <p class="text-center mt-4 text-muted small">Default: admin / admin123</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
